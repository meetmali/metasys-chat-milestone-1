<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metasys API Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #141414;
      --surface-2:    #1a1a1a;
      --border:       #252525;
      --border-focus: #2e4a66;
      --text:         #d8d8d8;
      --text-dim:     #888;
      --text-muted:   #444;
      --accent:       #3b82f6;
      --accent-hover: #2563eb;
      --user-bg:      #0f2236;
      --user-border:  #1a3a55;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      flex-shrink: 0;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-tag {
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .status-dot.ready  { background: #22c55e; }
    .status-dot.busy   { background: #f59e0b; }
    .status-dot.error  { background: #ef4444; }

    .btn-outline {
      font-family: var(--sans);
      font-size: 11px;
      padding: 5px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline:hover    { border-color: var(--accent); color: var(--accent); }
    .btn-outline:disabled { opacity: 0.35; cursor: default; }

    /* ------------------------------------------------------------------ */
    /* Messages                                                             */
    /* ------------------------------------------------------------------ */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .messages::-webkit-scrollbar       { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding-bottom: 60px;
    }

    .empty-state h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .empty-state p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 18px;
      width: 100%;
      max-width: 520px;
    }

    .suggestion {
      font-family: var(--sans);
      font-size: 12px;
      text-align: left;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); }

    /* Message rows */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
    }
    .message.user      { align-self: flex-end;   align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
      padding: 0 3px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.75;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 10px 2px 10px 10px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px 10px 10px 10px;
      font-family: var(--mono);
      font-size: 12.5px;
      white-space: pre-wrap;
    }

    /* Blinking cursor while streaming */
    .message.assistant .bubble.streaming::after {
      content: "_";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ------------------------------------------------------------------ */
    /* Input area                                                           */
    /* ------------------------------------------------------------------ */
    .input-area {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--border-focus); }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
      line-height: 1.5;
      resize: none;
      min-height: 20px;
      max-height: 120px;
    }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover   { background: var(--accent-hover); }
    .send-btn:active  { transform: scale(0.93); }
    .send-btn:disabled { background: var(--border); cursor: default; }

    .send-btn svg { width: 15px; height: 15px; fill: white; }

    .footer-note {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      text-align: center;
      margin-top: 7px;
    }
    .footer-note.err { color: #ef4444; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <span class="header-wordmark">Metasys API Assistant</span>
      <span class="header-tag">Milestone 1 — RAG</span>
    </div>
    <div class="header-right">
      <div class="status-dot" id="status-dot" title="Status"></div>
      <button class="btn-outline" id="ingest-btn" onclick="triggerIngest()">Re-ingest spec</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <h1>Metasys REST API Assistant</h1>
      <p>Ask anything about the Metasys REST API endpoints, parameters, and responses.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="ask('What endpoints are available for working with spaces?')">What endpoints are available for working with spaces?</button>
        <button class="suggestion" onclick="ask('How do I authenticate with the Metasys REST API?')">How do I authenticate with the Metasys REST API?</button>
        <button class="suggestion" onclick="ask('What query parameters does GET /objects support?')">What query parameters does GET /objects support?</button>
        <button class="suggestion" onclick="ask('How does pagination work in the Metasys API?')">How does pagination work in the Metasys API?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="input"
          placeholder="Ask about the Metasys REST API..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="footer-note" id="footer-note">metasys-chat &mdash; all inference is local</div>
  </div>

  <script>
    let streaming = false;

    /* ------------------------------------------------------------------ */
    /* Utilities                                                            */
    /* ------------------------------------------------------------------ */

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function ask(text) {
      document.getElementById("input").value = text;
      sendMessage();
    }

    function setStatus(state) {            // "ready" | "busy" | "error" | ""
      const dot = document.getElementById("status-dot");
      dot.className = "status-dot" + (state ? " " + state : "");
    }

    function setNote(text, isErr = false) {
      const el = document.getElementById("footer-note");
      el.textContent = text;
      el.className = "footer-note" + (isErr ? " err" : "");
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    /* ------------------------------------------------------------------ */
    /* Message rendering                                                    */
    /* ------------------------------------------------------------------ */

    function addMessage(role, text = "") {
      const emptyState = document.getElementById("empty-state");
      if (emptyState) emptyState.remove();

      const wrap = document.getElementById("messages");
      const div  = document.createElement("div");
      div.className = "message " + role;
      div.innerHTML =
        `<div class="message-label">${role === "user" ? "You" : "Assistant"}</div>` +
        `<div class="bubble${role === "assistant" ? " streaming" : ""}">${escHtml(text)}</div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
      return div.querySelector(".bubble");
    }

    function scrollBottom() {
      const wrap = document.getElementById("messages");
      wrap.scrollTop = wrap.scrollHeight;
    }

    /* ------------------------------------------------------------------ */
    /* Send message                                                         */
    /* ------------------------------------------------------------------ */

    async function sendMessage() {
      if (streaming) return;
      const input   = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      input.value = "";
      input.style.height = "auto";
      streaming = true;
      document.getElementById("send-btn").disabled = true;
      setStatus("busy");
      setNote("generating...");

      addMessage("user", message);
      const bubble = addMessage("assistant");

      try {
        const res = await fetch("/chat", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ message }),
        });

        if (!res.ok) {
          bubble.classList.remove("streaming");
          bubble.textContent = "Server error " + res.status;
          setStatus("error");
          setNote("request failed", true);
          return;
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = "";
        let   full    = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();          // keep incomplete last line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6);
            if (raw === "[DONE]") continue;
            try {
              full += JSON.parse(raw);   // tokens are JSON-encoded strings
              bubble.textContent = full;
              scrollBottom();
            } catch (_) { /* partial frame — skip */ }
          }
        }

        bubble.classList.remove("streaming");
        setStatus("ready");
        setNote("metasys-chat \u2014 all inference is local");

      } catch (err) {
        bubble.classList.remove("streaming");
        bubble.textContent = "Connection error. Is the server running?";
        setStatus("error");
        setNote("connection error", true);
      } finally {
        document.getElementById("send-btn").disabled = false;
        streaming = false;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Ingest trigger                                                       */
    /* ------------------------------------------------------------------ */

    async function triggerIngest() {
      const btn = document.getElementById("ingest-btn");
      btn.disabled = true;
      btn.textContent = "Ingesting...";
      setStatus("busy");
      setNote("running ingestion...");

      try {
        const res  = await fetch("/ingest", { method: "POST" });
        const data = await res.json();
        if (res.ok) {
          setStatus("ready");
          setNote(data.message || "Ingestion complete");
        } else {
          setStatus("error");
          setNote(data.detail || "Ingestion failed", true);
        }
      } catch (_) {
        setStatus("error");
        setNote("Ingestion failed — server not reachable", true);
      } finally {
        btn.disabled = false;
        btn.textContent = "Re-ingest spec";
      }
    }

    /* ------------------------------------------------------------------ */
    /* Init — check health on load                                          */
    /* ------------------------------------------------------------------ */

    async function checkHealth() {
      try {
        const res  = await fetch("/health");
        const data = await res.json();
        if (data.chroma_ready) {
          setStatus("ready");
        } else {
          setStatus("error");
          setNote("ChromaDB not ready — run: python backend/ingest.py", true);
        }
      } catch (_) {
        setStatus("error");
        setNote("Server not reachable", true);
      }
    }

    checkHealth();
  </script>
</body>
</html>
